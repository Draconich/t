name: VPN Server (AWG/WARP)
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: awg or warp"
        required: true
        default: "awg"
      gist_id:
        description: "Gist ID generated by client"
        required: true

concurrency:
  group: vpn-server
  cancel-in-progress: true

jobs:
  run-server:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Make binaries executable
        run: sudo chmod +x ./vpn
      - name: Run Server Logic
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          sudo env "PATH=$PATH:$(pwd)/bin" GH_PAT=$GH_PAT  \
          ./vpn -role server -mode ${{ inputs.mode }}
